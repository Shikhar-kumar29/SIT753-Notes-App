version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - notes-network

  # Backend Service
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/notes_db
    depends_on:
      - mongodb
    networks:
      - notes-network

  # Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge
